name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build static site
        run: npm run build:pages
        env:
          NEXT_PUBLIC_SITE_URL: https://cryologicat.github.io/banyeshu-notes/
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  trigger-homepage:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout homepage with dedicated deploy key
        uses: actions/checkout@v6
        with:
          repository: CryoLogicat/qunyaodu.github.io
          ref: master
          path: homepage
          ssh-key: ${{ secrets.HOMEPAGE_DEPLOY_KEY }}
      - name: Record the published blog version
        run: |
          cd homepage
          printf '%s\n' "$GITHUB_SHA" > .blog-source-sha
          git add .blog-source-sha
          if git diff --cached --quiet; then
            echo "Homepage already references this blog version."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Sync blog ${GITHUB_SHA::7}"
          git push origin master
